<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#3f5f3f">

<title>Booking Success</title>

<link rel="stylesheet" href="css/success.css">

<!-- 🔥 jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="container">

  <div class="card">

    <!-- ✅ SUCCESS -->
    <div class="success-box">
      <div class="icon">✅</div>
      <h1>Booking Successful</h1>
      <p>Your ticket has been generated</p>
    </div>

    <!-- 📄 PDF PREVIEW -->
    <div class="pdf-box" id="ticketBox">

  <div class="ticket">

    <h2>🎫 SAMPLE TICKET</h2>

    <p><strong>Udaipur Wildlife Sanctuary</strong></p>

    <hr>

    <p id="tName"></p>
    <p id="tMobile"></p>

    <hr>

    <p id="tAdult"></p>
    <p id="tChild"></p>
    <p id="tTotal"></p>

    <hr>

    <p id="tDate"></p>

    <p class="note">Show this ticket at entry gate</p>

  </div>

</div>

    <!-- 🔘 BUTTONS -->
    <div class="btn-group">
      <button onclick="goHome()">Back to Home</button>
      <button onclick="downloadPDF()">Download Ticket</button>
    </div>

  </div>

</div>

<script src="js/success.js"></script>
</body>
</html>
